services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seas-backend
    ports:
      - "8000:8000"
    volumes:
      - seas-data:/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/seas.db
      - DEBUG=false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped

volumes:
  seas-data:
    driver: local